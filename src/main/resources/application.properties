# ============================================================
#  OmniSync-K UBID — Application Configuration
# ============================================================

spring.application.name=omnisync-k-ubid
server.port=${PORT:8080}
server.address=0.0.0.0

# ── Database (H2 in-memory for local demo) ──────────────────
spring.datasource.url=jdbc:h2:mem:omnisyncdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Redis (Embedded — starts automatically) ─────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
omnisync.redis.embedded=true

# ── Kafka (Embedded EmbeddedKafkaBroker via test or mock) ───
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=omnisync-consumer-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
omnisync.kafka.mock=true

# ── OmniSync Core Settings ───────────────────────────────────
omnisync.conflict.window-ms=200
omnisync.conflict.policy=SWS_PRIORITY
omnisync.retry.max-attempts=5
omnisync.retry.backoff-ms=1000
omnisync.poller.interval-ms=15000
omnisync.idempotency.ttl-hours=24

# ── Swagger / OpenAPI ────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── Actuator ────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.info.env.enabled=true

info.app.name=OmniSync-K UBID
info.app.description=Two-Way Interoperability Middleware for Karnataka SWS
info.app.version=1.0.0
info.app.team=OmniSync Team

# ── Logging ─────────────────────────────────────────────────
logging.level.com.omnisync=DEBUG
logging.level.root=INFO
logging.pattern.console=%clr(%d{HH:mm:ss.SSS}){faint} %clr(%-5level){highlight} %clr([%15.15thread]){faint} %clr(%-40.40logger{39}){cyan} %msg%n
